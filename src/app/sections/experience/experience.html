<section id="experience" class="experience">

  <div class="section-container">

    <div class="section-header">
      <span class="label">Experience</span>
      <h2 class="section-title">
        Where I've <span class="accent">explored</span>
      </h2>
    </div>

    <div class="timeline">

      @for (item of items; track item.company; let i = $index) {
        <div
          #expCard
          class="timeline-item"
          [attr.data-idx]="i"
          [class.visible]="visibleCards().has(i)"
          [style.transition-delay]="(i * 120) + 'ms'"
        >
          <!-- Connector dot + line -->
          <div class="connector">
            <div class="dot" [class.dot--current]="item.current">
              @if (item.current) {
                <span class="dot-pulse"></span>
              }
            </div>
            @if (i < items.length - 1) {
              <div class="line"></div>
            }
          </div>

          <!-- Card -->
          <div class="card">
            <div class="card-head">
              <div>
                <h3 class="role">{{ item.role }}</h3>
                <p class="company">
                  <mat-icon class="company-icon">business</mat-icon>
                  {{ item.company }}
                </p>
              </div>
              <span class="period" [class.period--current]="item.current">
                {{ item.period }}
              </span>
            </div>

            <p class="description">{{ item.description }}</p>

            <div class="chips">
              @for (skill of item.skills; track skill) {
                <span class="chip">{{ skill }}</span>
              }
            </div>
          </div>

        </div>
      }

    </div>
  </div>

</section>
